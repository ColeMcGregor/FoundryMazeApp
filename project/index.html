<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maze Viewer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
    }

    h2 {
      margin-top: 0;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 180px));
      gap: 12px;
      margin-bottom: 16px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 14px;
      font-weight: 600;
    }

    .field input,
    .field select,
    button {
      font-size: 14px;
      padding: 6px 8px;
    }

    .buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .board {
      display: inline-grid;
      gap: 2px;
      background: #ccc;
      padding: 8px;
      user-select: none;
    }

    .cell {
      width: 24px;
      height: 24px;
      border: 1px solid rgba(0,0,0,0.1);
      box-sizing: border-box;
      cursor: pointer;
    }

    .open { background: white; }
    .wall-low { background: #333; }
    .wall-high { background: #3b82f6; }
    .void {
      visibility: hidden;
      cursor: default;
    }

    .layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    #meta {
      min-width: 280px;
      margin: 0;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h2>Maze Viewer</h2>

  <div class="controls">
    <div class="field">
      <label for="shape">Shape</label>
      <select id="shape">
        <option value="ellipse">Ellipse</option>
        <option value="rectangle">Rectangle</option>
      </select>
    </div>

    <div class="field">
      <label for="width">Width</label>
      <input id="width" type="number" min="1" value="18" />
    </div>

    <div class="field">
      <label for="height">Height</label>
      <input id="height" type="number" min="1" value="12" />
    </div>

    <div class="field">
      <label for="chainCount">Chain Count</label>
      <input id="chainCount" type="number" min="0" value="6" />
    </div>

    <div class="field">
      <label for="minChainLength">Min Chain Length</label>
      <input id="minChainLength" type="number" min="1" value="2" />
    </div>

    <div class="field">
      <label for="maxChainLength">Max Chain Length</label>
      <input id="maxChainLength" type="number" min="1" value="4" />
    </div>

    <div class="field">
      <label for="straightBias">Straight Bias</label>
      <input id="straightBias" type="number" min="0" max="1" step="0.05" value="0.65" />
    </div>

    <div class="field">
      <label for="maxPlacementAttempts">Max Placement Attempts</label>
      <input id="maxPlacementAttempts" type="number" min="1" value="200" />
    </div>

    <div class="field">
      <label for="seed">Build Seed</label>
      <input id="seed" type="number" step="1" placeholder="random" />
    </div>

    <div class="field">
      <label for="shuffleSeed">Shuffle Seed</label>
      <input id="shuffleSeed" type="number" step="1" placeholder="random" />
    </div>

    <div class="field">
      <label for="minChangeChance">Shuffle Min Change %</label>
      <input id="minChangeChance" type="number" min="0" max="100" value="0" />
    </div>

    <div class="field">
      <label for="maxChangeChance">Shuffle Max Change %</label>
      <input id="maxChangeChance" type="number" min="0" max="100" value="25" />
    </div>
  </div>

  <div class="buttons">
    <button id="build">Build</button>
    <button id="shuffle">Shuffle</button>
  </div>

  <div class="layout">
    <div id="board" class="board"></div>
    <pre id="meta"></pre>
  </div>

  <script type="module">
    import {
      buildMazeFromSpec,
      shuffleMazeCells,
      ShapeType,
      CellState
    } from "./maze.js";

    function numberOrUndefined(value) {
      if (value === "" || value == null) return undefined;
      const parsed = Number(value);
      return Number.isNaN(parsed) ? undefined : parsed;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getBuildSpec() {
      const minChainLength = Math.max(1, Number(document.getElementById("minChainLength").value));
      const maxChainLengthRaw = Math.max(1, Number(document.getElementById("maxChainLength").value));

      return {
        shape: document.getElementById("shape").value === ShapeType.RECTANGLE
          ? ShapeType.RECTANGLE
          : ShapeType.ELLIPSE,
        width: Math.max(1, Number(document.getElementById("width").value)),
        height: Math.max(1, Number(document.getElementById("height").value)),
        chainCount: Math.max(0, Number(document.getElementById("chainCount").value)),
        minChainLength,
        maxChainLength: Math.max(minChainLength, maxChainLengthRaw),
        straightBias: clamp(Number(document.getElementById("straightBias").value), 0, 1),
        maxPlacementAttempts: Math.max(1, Number(document.getElementById("maxPlacementAttempts").value)),
        seed: numberOrUndefined(document.getElementById("seed").value),
      };
    }

    function getShuffleOptions() {
      const minChangeChance = clamp(Number(document.getElementById("minChangeChance").value), 0, 100);
      const maxChangeChanceRaw = clamp(Number(document.getElementById("maxChangeChance").value), 0, 100);

      return {
        seed: numberOrUndefined(document.getElementById("shuffleSeed").value),
        minChangeChance,
        maxChangeChance: Math.max(minChangeChance, maxChangeChanceRaw),
      };
    }

    function nextCellState(state) {
      if (state === CellState.OPEN) return CellState.WALL_LOW;
      if (state === CellState.WALL_LOW) return CellState.WALL_HIGH;
      return CellState.OPEN;
    }

    let currentSpec = getBuildSpec();
    let maze = buildMazeFromSpec(currentSpec);

    function render() {
      const board = document.getElementById("board");
      const meta = document.getElementById("meta");

      board.innerHTML = "";
      board.style.gridTemplateColumns = `repeat(${maze.width}, 24px)`;

      for (let y = 0; y < maze.height; y++) {
        for (let x = 0; x < maze.width; x++) {
          const div = document.createElement("div");
          const cellKey = `${x},${y}`;

          div.classList.add("cell");

          if (!maze.activeCells.has(cellKey)) {
            div.classList.add("void");
          } else {
            const state = maze.stateByCell.get(cellKey);

            if (state === CellState.WALL_LOW) {
              div.classList.add("wall-low");
            } else if (state === CellState.WALL_HIGH) {
              div.classList.add("wall-high");
            } else {
              div.classList.add("open");
            }

            div.addEventListener("click", () => {
              const currentState = maze.stateByCell.get(cellKey);
              maze.stateByCell.set(cellKey, nextCellState(currentState));
              render();
            });
          }

          board.appendChild(div);
        }
      }

      meta.textContent = JSON.stringify(
        {
          spec: currentSpec,
          meta: maze.meta,
        },
        null,
        2
      );
    }

    document.getElementById("build").onclick = () => {
      currentSpec = getBuildSpec();
      maze = buildMazeFromSpec(currentSpec);
      render();
    };

    document.getElementById("shuffle").onclick = () => {
      maze = shuffleMazeCells(maze, getShuffleOptions());
      render();
    };

    render();
  </script>
</body>
</html>
